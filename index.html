
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Lamp Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
    #connectionBadge{
    padding:12px 24px;
    border-radius:50px;
    font-size:14px;
    font-weight:700;

    box-shadow:
    0 8px 20px rgba(0,0,0,.12),
    inset 0 2px 5px rgba(255,255,255,.4);

    transition:.3s ease;
}
body{
    min-height:100vh;
    background:linear-gradient(
        135deg,
        #f8fbff,
        #e0f2fe,
        #bfdbfe,
        #93c5fd
    );
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:#1e293b;
    font-family:'Segoe UI',sans-serif;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.glass{
    width:100%;
    max-width:650px;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:30px;
    border:1px solid rgba(255,255,255,.8);
    box-shadow:
    0 15px 40px rgba(59,130,246,.15),
    0 0 30px rgba(59,130,246,.08);
}

h2{
    color:#2563eb;
    font-weight:700;
}

.lamp{
    width:150px;
    height:150px;
    border-radius:50%;
    background:#dbeafe;
    border:5px solid #bfdbfe;
    margin:auto;
    transition:.4s;
}

.lamp.on{
    background:#facc15;
    box-shadow:
    0 0 20px #fde047,
    0 0 50px #fde047,
    0 0 100px #facc15;
}

.stat-box{
    background:#f8fafc;
    border:1px solid #dbeafe;
    padding:18px;
    border-radius:20px;
    box-shadow:
    0 5px 15px rgba(59,130,246,.08);
}

/* BUBBLE BUTTON */

.btn{
    border:none !important;
    border-radius:50px !important;
    padding:14px 25px;
    font-weight:700;
    letter-spacing:.5px;

    position:relative;
    overflow:hidden;

    transition:all .3s ease;

    box-shadow:
    0 8px 20px rgba(0,0,0,.12),
    inset 0 2px 5px rgba(255,255,255,.5);
}

.btn::before{
    content:"";
    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.5),
        transparent
    );

    transition:.6s;
}

.btn:hover::before{
    left:100%;
}

.btn:hover{
    transform:translateY(-4px) scale(1.03);

    box-shadow:
    0 15px 30px rgba(0,0,0,.18),
    inset 0 2px 5px rgba(255,255,255,.6);
}

.btn:active{
    transform:scale(.96);
}

/* Tombol Simpan */

.btn-primary{
    background:linear-gradient(
    135deg,
    #2563eb,
    #60a5fa
    ) !important;
}

/* Tombol ON */

.btn-success{
    background:linear-gradient(
    135deg,
    #10b981,
    #34d399
    ) !important;
}

/* Tombol OFF */

.btn-danger{
    background:linear-gradient(
    135deg,
    #ef4444,
    #fb7185
    ) !important;
}

/* Timer */

.btn-warning{
    background:linear-gradient(
    135deg,
    #f59e0b,
    #fbbf24
    ) !important;
    color:white !important;
}

/* Jadwal */

.btn-info{
    background:linear-gradient(
    135deg,
    #0284c7,
    #38bdf8
    ) !important;
    color:white !important;
}

.progress{
    height:25px;
    border-radius:20px;
    background:#e0f2fe;
    overflow:hidden;
}

.progress-bar{
    background:linear-gradient(
    90deg,
    #2563eb,
    #60a5fa
    );
    font-weight:bold;
}

input,
select{
    margin-top:10px;
    border-radius:12px !important;
    border:1px solid #cbd5e1 !important;
    padding:10px !important;
}

.form-control:focus,
.form-select:focus{
    border-color:#3b82f6 !important;
    box-shadow:0 0 0 0.2rem rgba(59,130,246,.25) !important;
}

.badge{
    padding:10px 15px;
    border-radius:30px;
    font-size:14px;
}

.dark-mode{
    background:#0f172a !important;
}

.dark-mode .glass{
    background:rgba(15,23,42,.95);
    color:white;
}

.dark-mode .stat-box{
    background:#1e293b;
    border-color:#334155;
    color:white;
}

.dark-mode input,
.dark-mode select{
    background:#0f172a;
    color:white;
    border-color:#334155 !important;
}

hr{
    border-color:#cbd5e1;
}
.bg-success{
    background:linear-gradient(
    135deg,
    #10b981,
    #34d399
    ) !important;
}

.bg-danger{
    background:linear-gradient(
    135deg,
    #ef4444,
    #fb7185
    ) !important;
}

.bg-secondary{
    background:linear-gradient(
    135deg,
    #64748b,
    #94a3b8
    ) !important;
}
</style>
</head>
<body>

<div class="glass">

<h2 class="text-center mb-2">
    <i class="bi bi-lightbulb-fill text-warning"></i>
    Smart Lamp Dashboard
</h2>

<p class="text-center text-secondary mb-4">
    IoT Smart Lighting Control
</p>

<div class="text-center mb-3">

<span id="connectionBadge"
class="badge bg-secondary">

<i class="bi bi-wifi"></i>
Disconnected

</span>

</div>

<div id="lamp" class="lamp"></div>

<h4 id="status"
class="text-center mt-3">
Status: Belum Terhubung
</h4>

<hr>

<label>Token Blynk</label>

<input
type="text"
id="tokenInput"
class="form-control"
placeholder="Masukkan Auth Token">

<button
class="btn btn-primary w-100 mt-2"
onclick="saveToken()">

<i class="bi bi-key"></i>
Simpan Token

</button>

<hr>

<div class="row g-3">

    <div class="col-6">
        <button class="btn btn-success w-100" onclick="lampOn()">
            <i class="bi bi-lightbulb-fill fs-3"></i>
            <br>
            ON
        </button>
    </div>

    <div class="col-6">
        <button class="btn btn-danger w-100" onclick="lampOff()">
            <i class="bi bi-power fs-3"></i>
            <br>
            OFF
        </button>
    </div>

</div>
<hr>

<h5>Timer Otomatis Mati</h5>

<select
id="timer"
class="form-select">

<option value="0">Pilih Timer</option>
<option value="1">1 Menit</option>
<option value="5">5 Menit</option>
<option value="10">10 Menit</option>
<option value="30">30 Menit</option>

</select>

<button
class="btn btn-warning w-100 mt-2"
onclick="startTimer()">

<i class="bi bi-clock"></i>
Mulai Timer

</button>

<div class="progress mt-3">

<div
id="timerProgress"
class="progress-bar progress-bar-striped progress-bar-animated"
style="width:0%">

0%

</div>

</div>

<div
id="timerInfo"
class="mt-2 text-warning text-center">
</div>

<hr>

<h5>Jadwal Harian Otomatis</h5>

<div class="row">

<div class="col-6">

<label>Jam ON</label>

<input
type="time"
id="onTime"
class="form-control">

</div>

<div class="col-6">

<label>Jam OFF</label>

<input
type="time"
id="offTime"
class="form-control">

</div>

</div>

<button
class="btn btn-info w-100 mt-2"
onclick="saveSchedule()">

<i class="bi bi-calendar-check"></i>
Simpan Jadwal

</button>

<hr>

<div class="row text-center">

<div class="col-4">
<div class="stat-box">
<h4 id="totalOn">0</h4>
<small>Total ON</small>
</div>
</div>

<div class="col-4">
<div class="stat-box">
<h4 id="timerCount">0</h4>
<small>Timer</small>
</div>
</div>

<div class="col-4">
<div class="stat-box">
<h4 id="uptime">0</h4>
<small>Menit ON</small>
</div>
</div>

</div>

<hr>

<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="darkSwitch">

<label class="form-check-label">
Dark Mode
</label>

</div>

</div>

<div
class="toast position-fixed bottom-0 end-0 m-3"
id="toast">

<div class="toast-body text-dark"
id="toastText">
Info
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

let token =
localStorage.getItem("blynkToken") || "";

const pin = "V0";

let countdown;

let totalOn =
parseInt(localStorage.getItem("totalOn")) || 0;

let timerCount =
parseInt(localStorage.getItem("timerCount")) || 0;

let uptime =
parseInt(localStorage.getItem("uptime")) || 0;

function showToast(text){

document.getElementById("toastText")
.innerText = text;

new bootstrap.Toast(
document.getElementById("toast")
).show();

}

function saveToken(){

token =
document.getElementById("tokenInput")
.value.trim();

if(!token){
showToast("Masukkan token");
return;
}

localStorage.setItem(
"blynkToken",
token
);

showToast("Token disimpan");

getStatus();

}

function updateStats(){

document.getElementById("totalOn")
.innerText = totalOn;

document.getElementById("timerCount")
.innerText = timerCount;

document.getElementById("uptime")
.innerText = uptime;

localStorage.setItem(
"totalOn",
totalOn
);

localStorage.setItem(
"timerCount",
timerCount
);

localStorage.setItem(
"uptime",
uptime
);

}

function updateUI(state){

const lamp =
document.getElementById("lamp");

const status =
document.getElementById("status");

if(state){

lamp.classList.add("on");

status.innerHTML =
"Status: Lampu Menyala";

}else{

lamp.classList.remove("on");

status.innerHTML =
"Status: Lampu Mati";

}

}

async function lampOn(){

if(!token) return;

await fetch(
`https://blynk.cloud/external/api/update?token=${token}&${pin}=1`
);

updateUI(true);

totalOn++;

updateStats();

showToast("Lampu ON");

}

async function lampOff(){

if(!token) return;

await fetch(
`https://blynk.cloud/external/api/update?token=${token}&${pin}=0`
);

updateUI(false);

showToast("Lampu OFF");

}

async function getStatus(){

if(!token) return;

try{

let res =
await fetch(
`https://blynk.cloud/external/api/get?token=${token}&${pin}`
);

let data =
await res.text();

document
.getElementById("connectionBadge")
.className =
"badge bg-success text-white";

document
.getElementById("connectionBadge")
.innerHTML =
'<i class="bi bi-wifi"></i> Connected';

updateUI(data=="1");

}catch{

document
.getElementById("connectionBadge")
.className =
"badge bg-danger text-white";

document
.getElementById("connectionBadge")
.innerHTML =
'<i class="bi bi-wifi-off"></i> Offline';

}

}

function startTimer(){

let minute =
parseInt(
document.getElementById("timer")
.value
);

if(minute===0) return;

timerCount++;

updateStats();

lampOn();

let total =
minute * 60;

let current =
total;

clearInterval(countdown);

countdown =
setInterval(()=>{

current--;

let percent =
(current/total)*100;

document
.getElementById("timerProgress")
.style.width =
percent+"%";

document
.getElementById("timerProgress")
.innerHTML =
Math.round(percent)+"%";

let m =
Math.floor(current/60);

let s =
current%60;

document
.getElementById("timerInfo")
.innerHTML =
`${m}:${String(s).padStart(2,'0')}`;

if(current<=0){

clearInterval(countdown);

lampOff();

document
.getElementById("timerInfo")
.innerHTML =
"Timer selesai";

}

},1000);

}

function saveSchedule(){

localStorage.setItem(
"onTime",
document.getElementById("onTime").value
);

localStorage.setItem(
"offTime",
document.getElementById("offTime").value
);

showToast("Jadwal disimpan");

}

function checkSchedule(){

let now = new Date();

let current =
String(now.getHours()).padStart(2,'0')
+
":"
+
String(now.getMinutes()).padStart(2,'0');

let onTime =
localStorage.getItem("onTime");

let offTime =
localStorage.getItem("offTime");

if(onTime && current===onTime){
lampOn();
}

if(offTime && current===offTime){
lampOff();
}

}

document
.getElementById("darkSwitch")
.addEventListener("change",e=>{

document.body.classList.toggle(
"dark-mode",
e.target.checked
);

});

window.onload=()=>{

document
.getElementById("tokenInput")
.value = token;

document
.getElementById("onTime")
.value =
localStorage.getItem("onTime") || "";

document
.getElementById("offTime")
.value =
localStorage.getItem("offTime") || "";

updateStats();

getStatus();

};

setInterval(getStatus,3000);

setInterval(checkSchedule,1000);

setInterval(()=>{

const lamp =
document
.getElementById("lamp");

if(lamp.classList.contains("on")){

uptime++;

updateStats();

}

},60000);

</script>

</body>
</html>
